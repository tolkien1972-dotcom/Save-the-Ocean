<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save the Ocean</title>

<style>
html,body{
margin:0;
overflow:hidden;
background:#021421;
font-family:Arial;
color:white;
}

#menu,#win{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
text-align:center;
}

#hud{
position:absolute;
top:10px;
left:10px;
display:flex;
gap:10px;
}

.pill{
background:rgba(0,0,0,.35);
padding:8px 14px;
border-radius:20px;
}

button{
padding:12px 24px;
border:none;
border-radius:8px;
font-size:18px;
background:#38c7ff;
cursor:pointer;
}
</style>
</head>

<body>

<div id="menu">
<h1>🐢 Save the Ocean</h1>
<button onclick="startGame()">Start Adventure</button>
</div>

<div id="win" style="display:none">
<h1>🌊 Ocean Saved!</h1>
<button onclick="location.reload()">Play Again</button>
</div>

<div id="hud" style="display:none">
<div class="pill" id="score">⭐ 0</div>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

function resize(){
canvas.width = window.innerWidth
canvas.height = window.innerHeight
}
resize()
window.onresize = resize


/* LOAD SPRITE SHEET */

const sprite = new Image()
sprite.src = "assets/ocean_assets.png"


let running = false

function startGame(){
document.getElementById("menu").style.display="none"
document.getElementById("hud").style.display="flex"
running=true
}


/* WORLD */

let worldWidth = 12000
let cameraX = 0

const player={
x:200,
y:420,
targetX:200,
targetY:420,
frame:0
}

let score=0


/* OBJECTS */

const trash=[]
for(let i=0;i<30;i++){
trash.push({x:900+i*350,y:300+Math.random()*250})
}

const platforms=[]
for(let i=0;i<20;i++){
platforms.push({
x:i*600,
y:420+Math.sin(i)*120,
w:260,
h:120
})
}

const crabs=[]
for(let i=0;i<6;i++){
crabs.push({x:2000+i*1600,y:520,dir:1})
}

const goal={x:11500,y:280}


/* BACKGROUND LIFE */

const fish=[]
for(let i=0;i<40;i++){
fish.push({x:Math.random()*worldWidth,y:80+Math.random()*400,s:0.4+Math.random()})
}

const bubbles=[]
for(let i=0;i<120;i++){
bubbles.push({x:Math.random()*worldWidth,y:Math.random()*1200,s:1+Math.random()*2})
}



/* BACKGROUND */

function drawBackground(){

ctx.drawImage(
sprite,
0,0,1000,400,
0,0,
canvas.width,canvas.height
)

}


/* BUBBLES */

function drawBubbles(){
bubbles.forEach(b=>{
b.y -= b.s
if(b.y<0) b.y = canvas.height

let sx = b.x - cameraX

ctx.beginPath()
ctx.arc(sx,b.y,2,0,Math.PI*2)
ctx.strokeStyle="rgba(255,255,255,.5)"
ctx.stroke()
})
}


/* FISH */

function drawFish(){
fish.forEach(f=>{
f.x += f.s
if(f.x>worldWidth)f.x=0

let x=f.x-cameraX

ctx.drawImage(
sprite,
1020,150,120,80,
x,f.y,
60,40
)
})
}


/* PLATFORMS */

function drawPlatforms(){
platforms.forEach(p=>{

let x = p.x - cameraX

ctx.drawImage(
sprite,
0,420,260,150,
x,p.y,
260,120
)

})
}


/* TRASH */

function drawTrash(){
trash.forEach((t,i)=>{

let x=t.x-cameraX

ctx.drawImage(
sprite,
1000,420,120,120,
x-20,t.y-20,
40,40
)

if(Math.hypot(player.x-t.x,player.y-t.y)<40){
trash.splice(i,1)
score++
document.getElementById("score").innerText="⭐ "+score
}

})
}


/* CRABS */

function updateCrabs(){
crabs.forEach(c=>{

c.x += c.dir

if(c.x%300<2) c.dir *= -1

if(Math.abs(player.x-c.x)<40 && Math.abs(player.y-c.y)<40){
score=Math.max(0,score-2)
document.getElementById("score").innerText="⭐ "+score
}

})
}

function drawCrabs(){
crabs.forEach(c=>{

let x=c.x-cameraX

ctx.drawImage(
sprite,
1000,220,180,150,
x-35,c.y-35,
70,60
)

})
}


/* GOAL */

function drawGoal(){

let x=goal.x-cameraX

ctx.drawImage(
sprite,
1180,420,220,200,
x-50,goal.y-50,
100,90
)

if(Math.abs(player.x-goal.x)<40){
running=false
document.getElementById("win").style.display="block"
}

}


/* TURTLE */

function drawTurtle(){

let x=player.x-cameraX
let y=player.y

let frame=Math.floor(player.frame%3)

ctx.drawImage(
sprite,
1000+frame*140,0,
140,120,
x-40,y-40,
80,70
)

player.frame+=0.2

}


/* MOVEMENT */

function move(){

player.x += (player.targetX-player.x)*0.08
player.y += (player.targetY-player.y)*0.08

cameraX = player.x - canvas.width*0.35

if(cameraX<0) cameraX=0
if(cameraX>worldWidth-canvas.width)
cameraX=worldWidth-canvas.width

}


/* TOUCH CONTROL */

canvas.addEventListener("pointerdown",e=>{

const rect=canvas.getBoundingClientRect()

player.targetX=(e.clientX-rect.left)+cameraX
player.targetY=(e.clientY-rect.top)

})


/* GAME LOOP */

function loop(){

if(!running){
requestAnimationFrame(loop)
return
}

ctx.clearRect(0,0,canvas.width,canvas.height)

drawBackground()
drawFish()
drawBubbles()

drawPlatforms()
drawTrash()

updateCrabs()
drawCrabs()

drawGoal()

move()
drawTurtle()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
