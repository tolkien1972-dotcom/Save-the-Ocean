<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Turtle – Save the Ocean</title>

<style>

body{
margin:0;
overflow:hidden;
background:#001e2f;
font-family:Arial;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:20px;
}

</style>

</head>

<body>

<div id="ui">Score: <span id="score">0</span></div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

window.addEventListener("resize",resize)
resize()

let score=0
let scoreUI=document.getElementById("score")

let turtle={
x:200,
y:200,
targetX:200,
targetY:200,
speed:0.05
}

let trash=[]
let fish=[]
let bubbles=[]

for(let i=0;i<10;i++){

trash.push({
x:Math.random()*2000,
y:Math.random()*canvas.height
})

}

for(let i=0;i<8;i++){

fish.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
speed:1+Math.random()*2
})

}

for(let i=0;i<40;i++){

bubbles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:2+Math.random()*4
})

}

let camX=0

canvas.addEventListener("pointermove",e=>{

turtle.targetX=e.clientX+camX
turtle.targetY=e.clientY

})

function update(){

turtle.x+=(turtle.targetX-turtle.x)*turtle.speed
turtle.y+=(turtle.targetY-turtle.y)*turtle.speed

camX=turtle.x-canvas.width/2

trash.forEach((t,i)=>{

if(Math.hypot(t.x-turtle.x,t.y-turtle.y)<40){

trash.splice(i,1)

score++

scoreUI.innerText=score

}

})

fish.forEach(f=>{

f.x-=f.speed

if(f.x<-50)f.x=canvas.width+Math.random()*300

})

bubbles.forEach(b=>{

b.y-=0.5

if(b.y<0){
b.y=canvas.height
b.x=Math.random()*canvas.width
}

})

}

function drawOcean(){

let g=ctx.createLinearGradient(0,0,0,canvas.height)

g.addColorStop(0,"#0077b6")
g.addColorStop(1,"#001e2f")

ctx.fillStyle=g
ctx.fillRect(0,0,canvas.width,canvas.height)

}

function drawBubbles(){

ctx.fillStyle="rgba(255,255,255,0.4)"

bubbles.forEach(b=>{

ctx.beginPath()
ctx.arc(b.x,b.y,b.r,0,Math.PI*2)
ctx.fill()

})

}

function drawFish(){

ctx.fillStyle="orange"

fish.forEach(f=>{

ctx.beginPath()
ctx.ellipse(f.x,f.y,15,8,0,0,Math.PI*2)
ctx.fill()

})

}

function drawTrash(){

ctx.fillStyle="#ccc"

trash.forEach(t=>{

ctx.fillRect(t.x-camX,t.y,20,20)

})

}

function drawTurtle(){

ctx.fillStyle="lime"

ctx.beginPath()
ctx.arc(turtle.x-camX,turtle.y,20,0,Math.PI*2)
ctx.fill()

}

function gameLoop(){

update()

drawOcean()
drawBubbles()
drawFish()
drawTrash()
drawTurtle()

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
