<!DOCTYPE html><html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Turtle – Save the Ocean V4</title>
<style>
html,body{margin:0;background:#021421;color:white;font-family:Arial;height:100%;overflow:hidden}
#hud{position:absolute;top:10px;left:10px;z-index:10;display:flex;gap:10px}
.pill{background:rgba(0,0,0,.35);padding:8px 12px;border-radius:20px;font-weight:bold}
canvas{display:block}
</style>
</head>
<body><div id="hud">
<div class="pill" id="score">⭐ 0</div>
<div class="pill" id="zone">🌊 Coral Garden</div>
</div><canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.onresize=resize

let worldWidth=5000
let cameraX=0

const player={x:200,y:400,targetX:200,targetY:400}

let score=0

const trash=[]
for(let i=0;i<20;i++){
trash.push({x:400+i*200,y:350+Math.random()*150})
}

const platforms=[
{x:0,y:500,w:500,h:80},
{x:600,y:420,w:300,h:50},
{x:1000,y:520,w:400,h:60},
{x:1600,y:430,w:300,h:50},
{x:2200,y:350,w:250,h:50},
{x:2600,y:500,w:300,h:60},
{x:3200,y:450,w:300,h:50},
{x:3800,y:380,w:250,h:50},
{x:4200,y:520,w:350,h:60}
]

const goal={x:4700,y:320}

const bubbles=[]
for(let i=0;i<60;i++){
bubbles.push({x:Math.random()*worldWidth,y:Math.random()*700,s:1+Math.random()*2})
}

function gradient(){
let g=ctx.createLinearGradient(0,0,0,canvas.height)
g.addColorStop(0,"#6bd3ff")
g.addColorStop(.5,"#0f6fa4")
g.addColorStop(1,"#021421")
ctx.fillStyle=g
ctx.fillRect(0,0,canvas.width,canvas.height)
}

function drawParallax(){
for(let i=0;i<5;i++){
let x=(i*900-cameraX*0.2)%900
ctx.fillStyle="rgba(255,255,255,.08)"
ctx.beginPath()
ctx.moveTo(x,0)
ctx.lineTo(x+150,0)
ctx.lineTo(x+350,canvas.height)
ctx.lineTo(x+200,canvas.height)
ctx.fill()
}
}

function drawBubbles(){
bubbles.forEach(b=>{
b.y-=b.s
if(b.y<0){b.y=canvas.height}
let sx=b.x-cameraX
ctx.beginPath()
ctx.arc(sx,b.y,3,0,Math.PI*2)
ctx.strokeStyle="rgba(255,255,255,.5)"
ctx.stroke()
})
}

function drawPlatforms(){
platforms.forEach(p=>{
let x=p.x-cameraX
ctx.fillStyle="#5a4a6a"
ctx.fillRect(x,p.y,p.w,p.h)
ctx.fillStyle="#71ffb0"
ctx.fillRect(x,p.y-10,p.w,10)
})
}

function drawTrash(){
trash.forEach((t,i)=>{
let x=t.x-cameraX
ctx.fillStyle="#e8f6ff"
ctx.fillRect(x-6,t.y-12,12,24)
if(Math.hypot(player.x-t.x,player.y-t.y)<40){
trash.splice(i,1)
score++
document.getElementById("score").innerText="⭐ "+score
}
})
}

function drawGoal(){
let x=goal.x-cameraX
ctx.strokeStyle="white"
ctx.strokeRect(x-25,goal.y-25,50,50)
ctx.beginPath()
ctx.arc(x,goal.y,10,0,Math.PI*2)
ctx.fillStyle="#7cffd7"
ctx.fill()
}

function drawTurtle(){
let x=player.x-cameraX
let y=player.y
ctx.fillStyle="#47e6b2"
ctx.beginPath()
ctx.ellipse(x,y,25,18,0,0,Math.PI*2)
ctx.fill()
ctx.fillStyle="#c8fff1"
ctx.beginPath()
ctx.arc(x+20,y-3,7,0,Math.PI*2)
ctx.fill()
}

function move(){
player.x+=(player.targetX-player.x)*0.08
player.y+=(player.targetY-player.y)*0.08

cameraX=player.x-canvas.width*0.3
if(cameraX<0)cameraX=0
if(cameraX>worldWidth-canvas.width)cameraX=worldWidth-canvas.width
}

canvas.addEventListener("pointerdown",e=>{
let rect=canvas.getBoundingClientRect()
player.targetX=e.clientX+cameraX
player.targetY=e.clientY
})

function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height)

gradient()
drawParallax()
drawBubbles()
drawPlatforms()
drawTrash()
drawGoal()
move()
drawTurtle()

requestAnimationFrame(loop)
}

loop()
</script></body>
</html>
