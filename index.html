<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turtle Level Editor</title>

<style>

body{
margin:0;
background:#0b2a3a;
font-family:Arial;
overflow:hidden;
}

#toolbar{
position:fixed;
top:10px;
left:10px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
color:white;
}

button{
margin:3px;
padding:6px 10px;
}

canvas{
display:block;
}

</style>

</head>

<body>

<div id="toolbar">

Tool:

<button onclick="tool='platform'">Platform</button>
<button onclick="tool='trash'">Trash</button>
<button onclick="tool='crab'">Crab</button>
<button onclick="tool='goal'">Baby Turtle</button>

<br><br>

<button onclick="exportLevel()">Export JSON</button>
<button onclick="clearLevel()">Clear</button>

</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

window.addEventListener("resize",resize)
resize()

let tool="platform"

let platforms=[]
let trash=[]
let enemies=[]
let goal=null

canvas.addEventListener("pointerdown",e=>{

let x=e.clientX
let y=e.clientY

if(tool==="platform"){
platforms.push({x:x,y:y,w:120,h:20})
}

if(tool==="trash"){
trash.push({x:x,y:y})
}

if(tool==="crab"){
enemies.push({type:"crab",x:x,y:y})
}

if(tool==="goal"){
goal={x:x,y:y}
}

})

function draw(){

ctx.fillStyle="#0a3b55"
ctx.fillRect(0,0,canvas.width,canvas.height)

platforms.forEach(p=>{
ctx.fillStyle="#a86f3e"
ctx.fillRect(p.x,p.y,p.w,p.h)
})

trash.forEach(t=>{
ctx.fillStyle="#ddd"
ctx.fillRect(t.x-10,t.y-10,20,20)
})

enemies.forEach(e=>{
ctx.fillStyle="red"
ctx.beginPath()
ctx.arc(e.x,e.y,15,0,Math.PI*2)
ctx.fill()
})

if(goal){
ctx.fillStyle="lime"
ctx.beginPath()
ctx.arc(goal.x,goal.y,20,0,Math.PI*2)
ctx.fill()
}

requestAnimationFrame(draw)

}

draw()

function exportLevel(){

let level={
platforms:platforms,
trash:trash,
enemies:enemies,
goal:goal
}

alert(JSON.stringify(level,null,2))

}

function clearLevel(){

platforms=[]
trash=[]
enemies=[]
goal=null

}

</script>

</body>
</html>
